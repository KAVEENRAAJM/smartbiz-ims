version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: smartbiz_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartbiz_ims
      MYSQL_USER: smartbiz_user
      MYSQL_PASSWORD: smartbiz_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: smartbiz_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  db_data:
