services:
  - type: web
    name: smartbiz-backend
    env: node
    buildCommand: "npm install && npm rebuild sqlite3"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartbiz-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  - type: web
    name: smartbiz-frontend
    env: static
    buildCommand: "cd client && npm install && npm run build"
    staticPublishPath: "./client/dist"
    envVars:
      - key: VITE_API_URL
        value: https://smartbiz-backend.onrender.com/api/v1
      - key: NODE_ENV
        value: production

databases:
  - name: smartbiz-db
    plan: free
    databaseName: smartbiz_ims
    user: smartbiz_user
